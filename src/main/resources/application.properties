# MySQL datasource (compose defines `mysql` service)
# When running in Docker Compose, set DB_HOST=mysql (service name). Locally defaults to localhost.
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:ecommerce_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${MYSQL_USER:ecommerce}
spring.datasource.password=${MYSQL_PASSWORD:ecommerce}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# If you prefer PostgreSQL, uncomment and set appropriate env vars
# spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:ecommerce_db}
# spring.datasource.username=${POSTGRES_USER:ecommerce}
# spring.datasource.password=${POSTGRES_PASSWORD:ecommerce}

# Redis
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}

# MinIO
minio.url=http://localhost:${MINIO_PORT:9000}
minio.access-key=${MINIO_ROOT_USER:minioadmin}
minio.secret-key=${MINIO_ROOT_PASSWORD:minioadmin}

# JWT
jwt.secret=${JWT_SECRET:defaultsecret}
jwt.expiration=${JWT_EXPIRATION:3600}

# SpringDoc OpenAPI
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
